# General
set-option -g default-terminal "tmux-256color"
set-option -ag terminal-overrides ",*:RGB"
set-option -g history-limit 10000
set-option -s escape-time 0
set-option -g mouse on
set-option -g focus-events on
set-option -g set-clipboard on
set-option -g allow-passthrough on
set-option -g detach-on-destroy off
set-option -g renumber-windows on
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Status
set-option -g status-interval 5
set-option -g status-style "bg=#24283b,fg=#c0caf5"
set-option -g message-style "bg=#24283b,fg=#c0caf5"
set-option -g status-left ""
set-option -g status-right-length 50
set-option -g status-right "#[bg=#f7768e,fg=#1a1b26] #{session_name} "
set-window-option -g window-status-separator ""
set-window-option -g window-status-current-format "#[bg=#ff9e64,fg=#1a1b26] #{window_index} #[bg=#414868,fg=#c0caf5] #{window_name} "
set-window-option -g window-status-format "#[bg=#7aa2f7,fg=#1a1b26] #{window_index} #[bg=#414868,fg=#c0caf5] #{window_name} "
set-option -g pane-active-border-style "fg=#7aa2f7"
set-option -g pane-border-style "fg=#414868"

# Prefix
unbind-key C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Reload Configuration
bind-key q source-file $XDG_CONFIG_HOME/tmux/tmux.conf

# Copy Mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-key -X begin-selection
bind-key -T copy-mode-vi y send-key -X copy-selection-and-cancel

# Session Keybindings
bind-key C new-session
bind-key K kill-session
bind-key R command-prompt -I "#S" "rename-session -- '%%'"
bind-key -n M-P switch-client -p
bind-key -n M-N switch-client -n

# Window Keybindings
bind-key c new-window -c "#{pane_current_path}"
bind-key k kill-window
bind-key r command-prompt -I "#W" "rename-window -- '%%'"
bind-key -n M-p select-window -t -1
bind-key -n M-n select-window -t +1
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# Pane Keybindings
bind-key h split-window -v -c "#{pane_current_path}"
bind-key v split-window -h -c "#{pane_current_path}"
bind-key x kill-pane
bind-key -n M-Up select-pane -U
bind-key -n M-S-Up resize-pane -U 5
bind-key -n M-Down select-pane -D
bind-key -n M-S-Down resize-pane -D 5
bind-key -n M-Left select-pane -L
bind-key -n M-S-Left resize-pane -L 5
bind-key -n M-Right select-pane -R
bind-key -n M-S-Right resize-pane -R 5
