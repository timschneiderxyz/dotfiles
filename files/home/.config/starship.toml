command_timeout = 1000
add_newline = false

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character
"""

[character]
format = '$symbol '
success_symbol = '[вќЇ](green)'
error_symbol = '[вњ—](red)'

[directory]
format = '[$read_only]($read_only_style)[$path]($style) '
style = 'blue'
truncation_length = 0
read_only = 'рџ”’'

[git_branch]
format = 'on [$branch]($style) '
style = 'purple'

[git_state]
format = '[\[$state( $progress_current/$progress_total)\]]($style) '
style = 'purple'

[git_status]
format = '[(*$untracked$modified$staged$renamed$deleted$conflicted )($ahead_behind$stashed )]($style)'
style = 'purple'
untracked = 'вЂ‹'
modified = 'вЂ‹'
staged = 'вЂ‹'
renamed = 'вЂ‹'
deleted = 'вЂ‹'
conflicted = 'вЂ‹'
up_to_date = ''
ahead = "в‡Ў${count}"
behind = "в‡Ј${count}"
diverged = "в‡•в‡Ў${ahead_count}в‡Ј${behind_count}"
stashed = 'в‰Ў'

[cmd_duration]
format = '[$duration]($style)'
style = 'yellow'
